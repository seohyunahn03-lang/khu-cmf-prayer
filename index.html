function buildSeedRoster() {
  const cells = [];
  const members = [];
  SEED_CELLS.forEach((c) => {
    cells.push({ name: c.name, nick: c.nick, verseRef: c.verseRef, verseText: c.verseText });
    const push = (name, role) =>
      members.push({
        id: `${c.name}|${name}`,
        name, cell: c.name, role,
        cohort: B1.has(`${c.name}|${name}`) ? "본1" : "",
        active: true,
      });
    push(c.leader, "셀장");
    push(c.helper, "헬퍼");
    c.members.forEach((m) => push(m, ""));
  });
  return { version: 1, cells, members };
}

/* ================= storage =================
   순서: (1) 아티팩트 호스트의 window.storage (있으면) →
         (2) Firebase Firestore (db가 있으면, 실제 배포 환경) →
         (3) localStorage (오프라인/설정 전 임시 fallback) */
const hasRemote = typeof window !== "undefined" && window.storage && window.storage.get;
const S = {
  async get(key) {
    try {
      if (hasRemote) {
        const r = await window.storage.get(key, true);
        return r ? JSON.parse(r.value) : null;
      }
      if (typeof db !== "undefined" && db) {
        const snap = await db.collection("kv").doc(key).get();
        return snap.exists ? snap.data().value : null;
      }
      const v = localStorage.getItem("khcmf:" + key);
      return v ? JSON.parse(v) : null;
    } catch (e) { console.error("[storage.get]", key, e); return null; }
  },
  async set(key, val) {
    try {
      if (hasRemote) {
        const r = await window.storage.set(key, JSON.stringify(val), true);
        return !!r;
      }
      if (typeof db !== "undefined" && db) {
        await db.collection("kv").doc(key).set({ value: val, updatedAt: Date.now() });
        return true;
      }
      localStorage.setItem("khcmf:" + key, JSON.stringify(val));
      return true;
    } catch (e) { console.error("[storage.set]", key, e); return false; }
  },
};
const monthKey = (ym, suffix) => `pl:${ym}:${suffix}`;

/* ================= utils ================= */
function nowYM() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function shiftYM(ym, delta) {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
const ymLabel = (ym) => {
  const [y, m] = ym.split("-");
  return `${y}년 ${Number(m)}월`;
};
function copyText(text) {
  try {
    if (navigator.clipboard?.writeText) return navigator.clipboard.writeText(text);
  } catch {}
  const ta = document.createElement("textarea");
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  return Promise.resolve();
}

/* ================= 편지 조립 ================= */
function assembleLetter({ roster, subs, special, headVerse, filter }) {
  const blocks = [];
  const memberLine = (m, sub) => ({
    name: m.name, role: m.role,
    items: sub?.items?.length ? sub.items : [DEFAULT_PHRASE],
    submitted: !!sub?.items?.length,
  });
  const cohortBlock = (co) => {
    const list = roster.members.filter((m) => m.active && m.cohort === co);
    return {
      type: "flat",
      title: `${co} 기도제목`,
      lines: list.map((m) => memberLine(m, subs[m.cell]?.[m.id])),
    };
  };

  if (COHORTS.includes(filter)) {
    blocks.push(cohortBlock(filter));
    return blocks;
  }

  if (filter === "학년별") {
    COHORTS.forEach((co) => {
      const b = cohortBlock(co);
      if (b.lines.length) blocks.push(b);
    });
    return blocks;
  }

  SPECIAL_SECTIONS.slice(0, 2).forEach((sec) => {
    if (special?.[sec]) blocks.push({ type: "special", title: sec, text: special[sec] });
  });
  roster.cells.forEach((cell) => {
    const cellMembers = roster.members.filter((m) => m.active && m.cell === cell.name);
    const ordered = [
      ...cellMembers.filter((m) => m.role === "셀장"),
      ...cellMembers.filter((m) => m.role === "헬퍼"),
      ...cellMembers.filter((m) => !m.role),
    ];
    blocks.push({
      type: "cell",
      title: `${cell.name}셀`,
      nick: cell.nick, verseRef: cell.verseRef, verseText: cell.verseText,
      lines: ordered.map((m) => memberLine(m, subs[cell.name]?.[m.id])),
    });
  });
  SPECIAL_SECTIONS.slice(2).forEach((sec) => {
    if (special?.[sec]) blocks.push({ type: "special", title: sec, text: special[sec] });
  });
  return blocks;
}

function letterToText(blocks, ym, headVerse, markdown) {
  const H = (t) => (markdown ? `## ${t}` : `♥ ${t}`);
  const out = [];
  out.push(markdown ? `# 경희 CMF ${ymLabel(ym)} 기도편지` : `경희 CMF ${ymLabel(ym)} 기도편지`);
  out.push("");
  out.push(headVerse.text);
  out.push(`-${headVerse.ref}-`);
  out.push("");
  blocks.forEach((b) => {
    out.push(H(b.title + (b.nick ? ` (${b.verseRef}, ${b.nick})` : b.verseRef ? ` (${b.verseRef})` : "")));
    if (b.verseText) out.push(markdown ? `> ${b.verseText}` : `“${b.verseText}”`);
    if (b.type === "special") out.push(b.text);
    else b.lines.forEach((l) => {
      const roleTag = l.role ? `${l.role} ` : "";
      if (l.items.length <= 1) {
        const body = l.items[0] || "";
        out.push(markdown ? `- **${roleTag}${l.name}** ${body}` : `${roleTag}${l.name} ${body}`);
      } else {
        out.push(markdown ? `- **${roleTag}${l.name}**` : `${roleTag}${l.name}`);
        l.items.forEach((it, i) => out.push(`  ${i + 1}. ${it}`));
      }
    });
    out.push("");
  });
  return out.join("\n");
}

/* ================= 메인 앱 ================= */
function App() {
  const [entered, setEntered] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);
  const [tab, setTab] = useState("submit");
  const [ym, setYm] = useState(nowYM());
  const [roster, setRoster] = useState(null);
  const [subs, setSubs] = useState({});
  const [special, setSpecial] = useState({});
  const [headVerse, setHeadVerse] = useState(DEFAULT_HEAD_VERSE);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState("");

  const notify = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2200); };

  useEffect(() => {
    if (!entered) return;
    (async () => {
      let r = await S.get("pl:members");
      if (!r) { r = buildSeedRoster(); await S.set("pl:members", r); }
      setRoster(r);
    })();
  }, [entered]);

  useEffect(() => {
    if (!roster) return;
    let cancel = false;
    (async () => {
      setLoading(true);
      const cellNames = roster.cells.map((c) => c.name);
      const results = await Promise.all(cellNames.map((c) => S.get(monthKey(ym, `cell:${c}`))));
      const sp = await S.get(monthKey(ym, "special"));
      if (cancel) return;
      const map = {};
      cellNames.forEach((c, i) => { map[c] = results[i] || {}; });
      setSubs(map);
      setSpecial(sp?.sections || {});
      setHeadVerse(sp?.headVerse || DEFAULT_HEAD_VERSE);
      setLoading(false);
    })();
    return () => { cancel = true; };
  }, [roster, ym]);

  const saveSubmission = async (member, items) => {
    const key = monthKey(ym, `cell:${member.cell}`);
    const latest = (await S.get(key)) || {};
    latest[member.id] = { items, at: Date.now() };
    const ok = await S.set(key, latest);
    if (ok) {
      setSubs((p) => ({ ...p, [member.cell]: latest }));
      notify(`${member.name} 기도제목이 저장됐어요`);
    } else notify("저장에 실패했어요. 다시 시도해주세요.");
    return ok;
  };

  const saveSpecial = async (sections, hv) => {
    const ok = await S.set(monthKey(ym, "special"), { sections, headVerse: hv });
    if (ok) { setSpecial(sections); setHeadVerse(hv); notify("공통 섹션이 저장됐어요"); }
    else notify("저장에 실패했어요.");
  };

  const saveRoster = async (next) => {
    const ok = await S.set("pl:members", next);
    if (ok) { setRoster(next); notify("명단이 저장됐어요"); }
    else notify("저장에 실패했어요.");
  };

  if (!entered) return <Gate onEnter={(admin) => { setIsAdmin(admin); setEntered(true); }} />;

  const tabs = [
    { id: "submit", label: "기도제목 제출" },
    { id: "letter", label: "편지 보기" },
    ...(isAdmin ? [
      { id: "status", label: "제출 현황" },
      { id: "special", label: "공통 섹션" },
      { id: "roster", label: "명단 관리" },
    ] : []),
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: SANS, color: C.ink, animation: "fadeUp .6s ease both" }}>
      {/* 에어메일 스트라이프 */}
      <div style={{ height: 6, background: AIRMAIL, opacity: 0.85 }} />
      {/* header */}
      <div style={{ background: C.card, borderBottom: `1px solid ${C.line}`, padding: "16px 20px 12px" }}>
        <div style={{ maxWidth: 860, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{
              width: 34, height: 34, borderRadius: "50%", background: C.accent, color: "#fff",
              display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 15,
            }}>✉</span>
            <span style={{ fontSize: 20, fontWeight: 700, letterSpacing: 0.5 }}>KHU CMF 기도편지</span>
            {isAdmin && <span style={{ fontSize: 11, background: C.bgDeep, border: `1px solid ${C.line}`, borderRadius: 20, padding: "2px 10px", color: C.accentDeep, fontWeight: 700 }}>관리자</span>}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <Btn onClick={() => setYm(shiftYM(ym, -1))} style={{ padding: "6px 12px" }}>‹</Btn>
            <span style={{ fontWeight: 700, minWidth: 96, textAlign: "center", fontSize: 15 }}>{ymLabel(ym)}</span>
            <Btn onClick={() => setYm(shiftYM(ym, 1))} style={{ padding: "6px 12px" }}>›</Btn>
          </div>
        </div>
        <div style={{ maxWidth: 860, margin: "12px auto 0", display: "flex", gap: 6, flexWrap: "wrap" }}>
          {tabs.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              ...btnBase, padding: "7px 14px", fontSize: 13,
              background: tab === t.id ? C.ink : "transparent",
              color: tab === t.id ? "#FFFDF8" : C.inkSoft,
              border: tab === t.id ? `1.5px solid ${C.ink}` : "1.5px solid transparent",
              fontWeight: tab === t.id ? 700 : 400,
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 860, margin: "0 auto", padding: "20px 16px 60px" }}>
        {loading || !roster ? (
          <div style={{ textAlign: "center", padding: 60, color: C.inkSoft }}>
            <Spinner size={22} />
            <div style={{ marginTop: 10, fontSize: 13 }}>불러오는 중…</div>
          </div>
        ) : (
          <>
            {tab === "submit" && <SubmitTab roster={roster} subs={subs} onSave={saveSubmission} ym={ym} />}
            {tab === "letter" && <LetterTab roster={roster} subs={subs} special={special} headVerse={headVerse} ym={ym} notify={notify} />}
            {tab === "status" && isAdmin && <StatusTab roster={roster} subs={subs} ym={ym} notify={notify} />}
            {tab === "special" && isAdmin && <SpecialTab special={special} headVerse={headVerse} onSave={saveSpecial} />}
            {tab === "roster" && isAdmin && <RosterTab roster={roster} onSave={saveRoster} />}
          </>
        )}
      </div>

      {toast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: C.ink, color: "#fff", borderRadius: 12, padding: "10px 18px",
          fontSize: 13, boxShadow: "0 4px 16px rgba(0,0,0,0.18)", zIndex: 50, fontFamily: SANS,
        }}>{toast}</div>
      )}
    </div>
  );
}

/* ================= 제출 탭 ================= */
function SubmitTab({ roster, subs, onSave, ym }) {
  const [cell, setCell] = useState(null);
  const [member, setMember] = useState(null);
  const [text, setText] = useState("");
  const [saving, setSaving] = useState(false);
  const [editing, setEditing] = useState(false);

  const cellMembers = useMemo(() => {
    if (!cell) return [];
    const list = roster.members.filter((m) => m.active && m.cell === cell);
    return [
      ...list.filter((m) => m.role === "셀장"),
      ...list.filter((m) => m.role === "헬퍼"),
      ...list.filter((m) => !m.role),
    ];
  }, [roster, cell]);

  const mySub = member ? subs[member.cell]?.[member.id] : null;
  const alreadySubmitted = !!mySub?.items?.length;

  const pick = (m) => {
    setMember(m);
    const prev = subs[m.cell]?.[m.id];
    setText(prev?.items?.join("\n") || "");
    setEditing(!prev?.items?.length);
  };

  const startEdit = () => {
    setText(mySub?.items?.join("\n") || "");
    setEditing(true);
  };

  const cancelEdit = () => {
    setText(mySub?.items?.join("\n") || "");
    setEditing(false);
  };

  const save = async () => {
    const items = text.split("\n").map((s) => s.trim().replace(/^\d+[.)]\s*/, "")).filter(Boolean);
    setSaving(true);
    await onSave(member, items);
    setSaving(false);
    setEditing(false);
  };

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <Card>
        <SectionTitle>{ymLabel(ym)} 기도제목 제출</SectionTitle>
        <div style={{ fontSize: 13, color: C.inkSoft, marginBottom: 12 }}>셀 → 이름을 선택하고, 기도제목을 한 줄에 하나씩 적어주세요.</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {roster.cells.map((c, i) => (
            <button key={c.name} onClick={() => { setCell(c.name); setMember(null); }} style={{
              ...btnBase, padding: "7px 12px", fontSize: 13,
              borderColor: cell === c.name ? CELL_PALETTE[i % CELL_PALETTE.length] : C.line,
              background: cell === c.name ? CELL_PALETTE[i % CELL_PALETTE.length] : C.card,
              color: cell === c.name ? "#fff" : C.ink,
              fontWeight: cell === c.name ? 700 : 400,
            }}>{c.name}</button>
          ))}
        </div>
      </Card>

      {cell && (
        <Card>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {cellMembers.map((m) => {
              const done = !!subs[m.cell]?.[m.id]?.items?.length;
              const sel = member?.id === m.id;
              return (
                <button key={m.id} onClick={() => pick(m)} style={{
                  ...btnBase, padding: "7px 12px", fontSize: 13, fontWeight: 700,
                  background: sel ? C.ink : done ? C.bgDeep : C.card,
                  color: sel ? "#fff" : C.ink,
                }}>
                  {m.role && <span style={{ fontSize: 11, fontWeight: 400, color: sel ? "#f0e6d4" : C.accentDeep }}>{m.role}</span>}
                  {m.name}
                  {done && <span style={{ color: sel ? "#fff" : C.blue, fontSize: 12 }}>✓</span>}
                </button>
              );
            })}
          </div>
        </Card>
      )}

      {member && alreadySubmitted && !editing && (
        <Card>
          <SectionTitle>{member.name} 님이 제출한 기도제목</SectionTitle>
          <div style={{ display: "grid", gap: 4, marginBottom: 14 }}>
            {mySub.items.map((it, i) => (
              <div key={i} style={{ fontSize: 14, lineHeight: 1.8, color: C.ink }}>
                {mySub.items.length > 1 ? `${i + 1}. ${it}` : it}
              </div>
            ))}
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <Btn onClick={startEdit}>✎ 수정하기</Btn>
          </div>
        </Card>
      )}

      {member && (!alreadySubmitted || editing) && (
        <Card>
          <SectionTitle>{member.name} 님의 기도제목</SectionTitle>
          <textarea
            value={text} onChange={(e) => setText(e.target.value)} rows={6}
            placeholder={"예)\n시험기간 지혜롭게 보낼 수 있기를\n가족 모두 건강하기를"}
            style={{
              width: "100%", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12,
              padding: 12, fontSize: 14, fontFamily: SANS, background: C.bg,
              color: C.ink, outline: "none", resize: "vertical",
            }}
          />
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 10 }}>
            {alreadySubmitted && <Btn onClick={cancelEdit} disabled={saving}>취소</Btn>}
            <Btn primary onClick={save} disabled={saving}>
              {saving ? <Spinner size={15} /> : "✉"} 저장하기
            </Btn>
          </div>
        </Card>
      )}
    </div>
  );
}

/* ================= 제출 현황 탭 (관리자) ================= */
function StatusTab({ roster, subs, ym, notify }) {
  const rows = roster.cells.map((c, i) => {
    const list = roster.members.filter((m) => m.active && m.cell === c.name);
    const missing = list.filter((m) => !subs[c.name]?.[m.id]?.items?.length);
    return { cell: c.name, total: list.length, done: list.length - missing.length, missing, color: CELL_PALETTE[i % CELL_PALETTE.length] };
  });
  const totalDone = rows.reduce((a, r) => a + r.done, 0);
  const totalAll = rows.reduce((a, r) => a + r.total, 0);

  const copyReminder = async () => {
    const lines = [`[${ymLabel(ym)} 기도편지 미제출 안내]`];
    rows.forEach((r) => {
      if (r.missing.length) lines.push(`· ${r.cell}셀: ${r.missing.map((m) => m.name).join(", ")}`);
    });
    lines.push("", "기도제목 부탁드려요 🙏");
    await copyText(lines.join("\n"));
    notify("리마인드 문구를 복사했어요 (카톡에 붙여넣기)");
  };

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <Card style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <SectionTitle>{ymLabel(ym)} 제출 현황 — {totalDone}/{totalAll}명</SectionTitle>
        <Btn primary onClick={copyReminder}>미제출자 리마인드 복사</Btn>
      </Card>
      {rows.map((r) => (
        <Card key={r.cell}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, alignItems: "center" }}>
            <span style={{ fontWeight: 700 }}>{r.cell}셀</span>
            <span style={{ fontSize: 13, color: C.inkSoft }}>{r.done}/{r.total}</span>
          </div>
          <div style={{ height: 8, background: C.bgDeep, borderRadius: 6, overflow: "hidden", marginBottom: 10 }}>
            <div style={{ width: `${r.total ? (r.done / r.total) * 100 : 0}%`, height: "100%", background: r.color, transition: "width .3s" }} />
          </div>
          {r.missing.length > 0 ? (
            <div style={{ fontSize: 13, color: C.inkSoft, fontWeight: 400 }}>
              미제출: {r.missing.map((m) => m.name).join(", ")}
            </div>
          ) : (
            <div style={{ fontSize: 13, color: C.blue, display: "flex", alignItems: "center", gap: 4 }}>✓ 전원 제출 완료</div>
          )}
        </Card>
      ))}
    </div>
  );
}

/* ================= 공통 섹션 탭 (관리자) ================= */
function SpecialTab({ special, headVerse, onSave }) {
  const [draft, setDraft] = useState(special);
  const [hv, setHv] = useState(headVerse);
  useEffect(() => { setDraft(special); setHv(headVerse); }, [special, headVerse]);

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <Card>
        <SectionTitle>표지 말씀</SectionTitle>
        <input value={hv.ref} onChange={(e) => setHv({ ...hv, ref: e.target.value })}
          style={{ width: "100%", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12, padding: 10, fontSize: 14, marginBottom: 8, background: C.bg, fontFamily: SANS }}
          placeholder="말씀 출처 (예: 빌립보서 4:6-7)" />
        <textarea value={hv.text} onChange={(e) => setHv({ ...hv, text: e.target.value })} rows={3}
          style={{ width: "100%", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12, padding: 10, fontSize: 14, background: C.bg, resize: "vertical", fontFamily: SANS }} />
      </Card>
      {SPECIAL_SECTIONS.map((sec) => (
        <Card key={sec}>
          <SectionTitle>{sec}</SectionTitle>
          <textarea
            value={draft[sec] || ""} rows={4}
            onChange={(e) => setDraft({ ...draft, [sec]: e.target.value })}
            placeholder={`${sec} 기도제목 (비워두면 편지에서 제외돼요)`}
            style={{ width: "100%", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12, padding: 10, fontSize: 14, background: C.bg, resize: "vertical", fontFamily: SANS }}
          />
        </Card>
      ))}
      <div style={{ display: "flex", justifyContent: "flex-end" }}>
        <Btn primary onClick={() => onSave(draft, hv)}>공통 섹션 저장</Btn>
      </div>
    </div>
  );
}

/* ================= 명단 일괄 교체 파싱 =================
   빈 줄로 셀을 구분하고, 각 블록의 첫 줄은 셀 이름, 이후 줄은 멤버 한 명씩.
   이름 뒤 괄호로 역할/학년 표시 가능: "최우석 (셀장, 본1)" */
function parseBulkRoster(text) {
  const blocks = text.split(/\n\s*\n/).map((b) => b.trim()).filter(Boolean);
  const cells = [];
  const members = [];
  blocks.forEach((block) => {
    const lines = block.split("\n").map((l) => l.trim()).filter(Boolean);
    if (!lines.length) return;
    const cellName = lines[0];
    if (cells.some((c) => c.name === cellName)) return;
    cells.push({ name: cellName, nick: "", verseRef: "", verseText: "" });
    lines.slice(1).forEach((line) => {
      const m = line.match(/^(.+?)\s*(?:\(([^)]*)\))?$/);
      const name = (m ? m[1] : line).trim();
      if (!name) return;
      const tags = m && m[2] ? m[2].split(",").map((t) => t.trim()) : [];
      let role = "";
      let cohort = "";
      tags.forEach((t) => {
        if (t === "셀장" || t === "헬퍼") role = t;
        else if (COHORTS.includes(t) || t === "졸업/기타") cohort = t;
      });
      members.push({ id: `${cellName}|${name}`, name, cell: cellName, role, cohort, active: true });
    });
  });
  return { version: 1, cells, members };
}

/* ================= 명단 관리 탭 (관리자) ================= */
function RosterTab({ roster, onSave }) {
  const [cell, setCell] = useState(roster.cells[0]?.name);
  const [newName, setNewName] = useState("");
  const [bulkText, setBulkText] = useState("");
  const list = roster.members.filter((m) => m.cell === cell);

  const update = (id, patch) => {
    const next = { ...roster, members: roster.members.map((m) => (m.id === id ? { ...m, ...patch } : m)) };
    onSave(next);
  };
  const remove = (id) => {
    const next = { ...roster, members: roster.members.filter((m) => m.id !== id) };
    onSave(next);
  };
  const add = () => {
    const name = newName.trim();
    if (!name) return;
    const id = `${cell}|${name}`;
    if (roster.members.some((m) => m.id === id)) return;
    onSave({ ...roster, members: [...roster.members, { id, name, cell, role: "", cohort: "", active: true }] });
    setNewName("");
  };
  const applyBulk = () => {
    if (!bulkText.trim()) return;
    const parsed = parseBulkRoster(bulkText);
    if (!parsed.cells.length) { alert("셀이 인식되지 않았어요. 형식을 확인해주세요."); return; }
    if (confirm(`셀 ${parsed.cells.length}개, 멤버 ${parsed.members.length}명으로 명단 전체를 교체할까요?\n(기존 명단 구성은 사라지고, 이미 제출된 기도제목은 그대로 유지돼요)`)) {
      onSave(parsed);
      setBulkText("");
      setCell(parsed.cells[0]?.name);
    }
  };

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <Card>
        <SectionTitle>명단 일괄 교체 (학기 시작 시)</SectionTitle>
        <div style={{ fontSize: 13, color: C.inkSoft, marginBottom: 10, lineHeight: 1.8 }}>
          셀 이름을 한 줄에 쓰고, 그 아래 멤버를 한 줄에 한 명씩 적어주세요. 셀과 셀 사이는 빈 줄로 구분해요.<br />
          이름 뒤 괄호로 역할/학년을 표시할 수 있어요 (생략 가능): <b>최우석 (셀장, 본1)</b>
        </div>
        <textarea
          value={bulkText} onChange={(e) => setBulkText(e.target.value)} rows={10}
          placeholder={"우석태희셀\n최우석 (셀장)\n김태희 (헬퍼)\n김나연 (본1)\n김준성\n\n태섭한별셀\n임태섭 (셀장, 본2)\n박한별 (헬퍼)\n노은성 (본1)"}
          style={{ width: "100%", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 12, padding: 10, fontSize: 13, background: C.bg, resize: "vertical", fontFamily: SANS, lineHeight: 1.8 }}
        />
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10 }}>
          <Btn primary onClick={applyBulk}>이 내용으로 명단 전체 교체</Btn>
        </div>
      </Card>

      <Card style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {roster.cells.map((c) => (
            <button key={c.name} onClick={() => setCell(c.name)} style={{
              ...btnBase, padding: "6px 12px", fontSize: 13,
              background: cell === c.name ? C.ink : C.card, color: cell === c.name ? "#fff" : C.ink,
              fontWeight: cell === c.name ? 700 : 400,
            }}>{c.name}</button>
          ))}
        </div>
      </Card>

      <Card>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <input value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()}
            placeholder={`${cell}셀에 추가할 이름`}
            style={{ flex: 1, border: `1px solid ${C.line}`, borderRadius: 12, padding: 10, fontSize: 14, background: C.bg, fontFamily: SANS }} />
          <Btn primary onClick={add}>+ 추가</Btn>
        </div>
        <div style={{ display: "grid", gap: 8 }}>
          {list.map((m) => (
            <div key={m.id} style={{
              display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap",
              padding: "8px 10px", background: m.active ? C.bg : C.bgDeep,
              borderRadius: 10, opacity: m.active ? 1 : 0.55,
            }}>
              <span style={{ fontWeight: 700, minWidth: 64 }}>{m.name}</span>
              <select value={m.role} onChange={(e) => update(m.id, { role: e.target.value })}
                style={{ border: `1px solid ${C.line}`, borderRadius: 8, padding: "4px 8px", fontSize: 12, background: C.card, fontFamily: SANS }}>
                <option value="">셀원</option><option value="셀장">셀장</option><option value="헬퍼">헬퍼</option>
              </select>
              <select value={m.cohort} onChange={(e) => update(m.id, { cohort: e.target.value })}
                style={{ border: `1px solid ${C.line}`, borderRadius: 8, padding: "4px 8px", fontSize: 12, background: C.card, fontFamily: SANS }}>
                <option value="">학년 미지정</option>
                {[...COHORTS, "졸업/기타"].map((c) => <option key={c} value={c}>{c}</option>)}
              </select>
              <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
                <Btn onClick={() => update(m.id, { active: !m.active })} style={{ fontSize: 12, padding: "4px 10px" }}>
                  {m.active ? "휴면 처리" : "활성화"}
                </Btn>
                <Btn onClick={() => remove(m.id)} style={{ fontSize: 12, padding: "4px 8px", color: C.rose }}>×</Btn>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}
